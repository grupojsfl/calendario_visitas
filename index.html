<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Visitas Profesionales</title>
    
    <!-- FullCalendar CSS con tema moderno -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ESTILOS GLOBALES */
        :root {
            --primary-color: #007bff; /* Color principal azul */
            --bg-color: #f8f9fa; /* Fondo gris muy suave */
            --text-color: #212529; /* Texto casi negro */
            --calendar-bg: #ffffff; /* Fondo del calendario blanco */
        }

        body { 
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #calendar { 
            max-width: 1100px;
            margin: 10px auto;
            background: var(--calendar-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            box-sizing: border-box; /* Importante para padding en móviles */
        }

        h2.title { 
            text-align: center; 
            color: #1c1e21;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* PERSONALIZACIÓN MODERNA DE FULLCALENDAR */
        .fc-toolbar-title {
            font-weight: 700 !important;
            font-size: 1.6rem !important; /* Título un poco más pequeño en general */
        }

        .fc-button-primary {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
        }
        
        .fc-button-primary:hover {
            background-color: #0056b3 !important;
        }
        
        .fc-col-header-cell {
            background-color: #e9ecef;
            color: #495057;
            padding: 8px 0;
            font-weight: 600;
        }

        /* RESPONSIVIDAD (SOLUCIONES PARA MÓVILES) */
        @media (max-width: 768px) {
            body { padding: 5px; } /* Menos margen en el móvil */
            
            #calendar { 
                padding: 10px; /* Reducir padding interno */
                margin: 5px auto;
                border-radius: 8px; /* Bordes menos redondeados */
            }

            h2.title { font-size: 1.4rem; margin-bottom: 10px; }

            /* Ajuste del Título del Mes */
            .fc-toolbar-title {
                font-size: 1.2rem !important; /* Título mucho más pequeño en móvil */
                display: block; /* Forzar bloque */
                text-align: center;
                margin: 5px 0;
            }
            
            /* Reorganización de la barra de herramientas (Toolbar) */
            .fc-header-toolbar {
                display: flex !important;
                flex-direction: column !important; /* Botones arriba y abajo del título */
                gap: 8px; /* Espacio entre filas */
            }
            
            /* Colocación de los botones */
            .fc-toolbar-chunk:first-child { order: 1; text-align: center; } /* Prev/Next arriba */
            .fc-toolbar-chunk:nth-child(2) { order: 2; margin: 0 auto; width: 100%; text-align: center; } /* Título al centro */
            .fc-toolbar-chunk:last-child { order: 3; text-align: center; } /* Mes/Semana/Día abajo */

            .fc-button-group { width: 100%; display: flex; justify-content: center; }
            .fc-button { flex: 1; } /* Botones de vista ocupan todo el ancho */
            
            /* Ajustar tamaño de fuente en la cuadrícula para móviles */
            .fc-dayGridMonth-view .fc-col-header-cell-cushion { font-size: 0.8rem; }
            .fc-daygrid-day-number { font-size: 0.9rem; }
        }

        /* ESTILOS DEL MODAL (Mejorados) */
        #modalCita { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); 
        }
        
        .modal-content { 
            background: #fff; 
            margin: 15vh auto; /* 15% del alto de la vista */
            padding: 30px; 
            width: 350px; 
            max-width: 90%; /* Ajuste para móviles */
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            box-sizing: border-box;
        }
        
        h3 { margin-top: 0; color: #333; margin-bottom: 20px; font-weight: 600; }
        
        label { 
            display: block; 
            text-align: left; 
            margin: 15px 0 3px 10px; 
            font-size: 0.9em; 
            color: #666; 
            font-weight: 500;
        }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 5px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em;
        }
        
        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        .btn-guardar { 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            cursor: pointer; 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 1.1em; 
            margin-top: 25px;
            transition: background-color 0.2s;
        }
        
        .btn-guardar:hover { background-color: #0069d9; }
        
        .btn-cancelar { 
            background-color: transparent; 
            color: #721c24; 
            border: none; 
            cursor: pointer; 
            margin-top: 10px; 
            padding: 10px; 
            width: 100%; 
            font-size: 0.95em; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <h2 class="title">Agenda de Visitas Profesionales</h2>
    <div id="calendar"></div>

    <!-- Modal para Nueva Cita -->
    <div id="modalCita">
        <div class="modal-content">
            <h3>Nueva Cita</h3>
            <input type="text" id="citaTitulo" placeholder="Título de la visita">
            <input type="email" id="citaEmail" placeholder="Email del cliente">
            
            <label>Fecha:</label>
            <input type="date" id="citaFecha">
            
            <label>Hora de inicio:</label>
            <input type="time" id="citaHora">
            
            <label>Duración:</label>
            <select id="citaDuracion">
                <option value="30">30 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="90">1.5 horas</option>
                <option value="120">2 horas</option>
            </select>
            
            <button class="btn-guardar" onclick="guardarCita()">Guardar Cita</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <script>
        // CONFIGURACIÓN DE TU PROYECTO (Verificada con ID: szxkpojcodemgogmwowt)
        const SUPABASE_URL = 'https://szxkpojcodemgogmwowt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_yOolcYXWErzH6nqo3ixT3Q_UJ_eBtrw';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let calendar;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es', // Español de España
                firstDay: 1,  // Semana empieza en Lunes
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                buttonText: {
                    today: 'Hoy',
                    month: 'Mes',
                    week: 'Semana',
                    day: 'Día'
                },
                selectable: true,
                dateClick: function(info) {
                    abrirModal(info.dateStr);
                },
                // Cargar eventos desde Supabase
                events: async function(info, successCallback, failureCallback) {
                    try {
                        const { data, error } = await _supabase
                            .from('visitas')
                            .select('*');

                        if (error) throw error;

                        const events = data.map(event => ({
                            title: event.titulo,
                            start: event.fecha_inicio,
                            end: event.fecha_fin,
                            color: '#007bff'
                        }));
                        successCallback(events);
                    } catch (error) {
                        console.error("Error cargando eventos:", error);
                        failureCallback(error);
                    }
                }
            });
            calendar.render();
        });

        function abrirModal(fecha) {
            document.getElementById('citaFecha').value = fecha;
            document.getElementById('modalCita').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modalCita').style.display = 'none';
            document.getElementById('citaTitulo').value = '';
            document.getElementById('citaEmail').value = '';
        }

        async function guardarCita() {
            const titulo = document.getElementById('citaTitulo').value;
            const email = document.getElementById('citaEmail').value;
            const fecha = document.getElementById('citaFecha').value;
            const hora = document.getElementById('citaHora').value;
            const duracion = parseInt(document.getElementById('citaDuracion').value);

            if (!titulo || !email || !fecha || !hora) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            const inicio = new Date(`${fecha}T${hora}`);
            const fin = new Date(inicio.getTime() + duracion * 60000);

            try {
                const { data, error } = await _supabase
                    .from('visitas')
                    .insert([
                        {
                            titulo: titulo,
                            email_cliente: email,
                            fecha_inicio: inicio.toISOString(),
                            fecha_fin: fin.toISOString(),
                            notificado_dia_antes: false,
                            notificado_mismo_dia: false
                        }
                    ]);

                if (error) {
                    alert("Error al guardar: " + error.message);
                } else {
                    alert("¡Cita guardada correctamente!");
                    cerrarModal();
                    calendar.refetchEvents(); // Recargar calendario
                }
            } catch (err) {
                alert("Error de conexión: " + err.message);
            }
        }
    </script>
</body>
</html>
