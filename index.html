<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Visitas</title>
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; }
        #calendar { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Estilos del Modal */
        #modalCita {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-content h2 { margin-top: 0; color: #333; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #45a049; }
        .btn-cancelar { background-color: #f44336; }
        .btn-cancelar:hover { background-color: #da190b; }
    </style>
</head>
<body>

    <div id="calendar"></div>

    <!-- Modal para añadir cita -->
    <div id="modalCita">
        <div class="modal-content">
            <h2>Nueva Cita</h2>
            <input type="text" id="citaTitulo" placeholder="Título de la visita (Ej: Juan Pérez)">
            <input type="email" id="citaEmail" placeholder="Email del cliente">
            <label>Fecha:</label>
            <input type="date" id="citaFecha">
            <label>Hora:</label>
            <input type="time" id="citaHora">
            <label>Duración:</label>
            <select id="citaDuracion">
                <option value="30">30 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="90">1.5 horas</option>
                <option value="120">2 horas</option>
            </select>
            <button onclick="guardarCita()">Guardar Cita</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <script>
        // 1. CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = 'https://szxkpojcodemgomwwowt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6eGtwb2pjb2RlbWdvZ213b3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Njc5MzksImV4cCI6MjA5MzE0MzkzOX0.9THtJxDemqWGlv4iVvDVJLTZptjpHaaC1vXr4-i-w80';

        // Configuración especial para evitar "Failed to fetch"
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false,
                detectSessionInUrl: false
            }
        });

        let calendar;

        // 2. INICIALIZAR CALENDARIO
        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'es',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                // Cargar eventos desde Supabase
                events: async function(info, successCallback, failureCallback) {
                    try {
                        const { data, error } = await _supabase
                            .from('visitas')
                            .select('*');

                        if (error) throw error;

                        const events = data.map(v => ({
                            title: v.titulo,
                            start: v.fecha_inicio,
                            end: v.fecha_fin,
                            extendedProps: { email: v.email_cliente }
                        }));
                        successCallback(events);
                    } catch (err) {
                        console.error("Error al cargar eventos:", err);
                        failureCallback(err);
                    }
                },
                // Abrir modal al hacer clic en un día
                dateClick: function(info) {
                    abrirModal(info.dateStr);
                }
            });
            calendar.render();
        });

        // 3. FUNCIONES DEL MODAL
        function abrirModal(fecha) {
            document.getElementById('citaFecha').value = fecha;
            document.getElementById('modalCita').style.display = 'block';
        }

        function cerrarModal() {
            document.getElementById('modalCita').style.display = 'none';
        }

        // 4. GUARDAR CITA EN SUPABASE
        async function guardarCita() {
            const titulo = document.getElementById('citaTitulo').value;
            const email = document.getElementById('citaEmail').value;
            const fecha = document.getElementById('citaFecha').value;
            const hora = document.getElementById('citaHora').value;
            const duracion = parseInt(document.getElementById('citaDuracion').value);

            if (!titulo || !email || !fecha || !hora) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            // Calcular fechas de inicio y fin
            const inicio = new Date(`${fecha}T${hora}`);
            const fin = new Date(inicio.getTime() + duracion * 60000);

            try {
                const { data, error } = await _supabase
                    .from('visitas')
                    .insert([{
                        titulo: titulo,
                        email_cliente: email,
                        fecha_inicio: inicio.toISOString(),
                        fecha_fin: fin.toISOString(),
                        notificado_dia_antes: false,
                        notificado_mismo_dia: false
                    }]);

                if (error) throw error;

                alert("Cita guardada correctamente.");
                cerrarModal();
                calendar.refetchEvents(); // Recargar el calendario

                // Limpiar formulario
                document.getElementById('citaTitulo').value = "";
                document.getElementById('citaEmail').value = "";
            } catch (err) {
                console.error("Error detallado:", err);
                alert("Error al conectar con la base de datos. Asegúrate de haber configurado las Políticas (RLS) en el panel de Supabase.");
            }
        }

        // Cerrar modal si se hace clic fuera
        window.onclick = function(event) {
            if (event.target == document.getElementById('modalCita')) {
                cerrarModal();
            }
        }
    </script>
</body>
</html>
