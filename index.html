<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fc-button-bg-color: #4f46e5; --fc-button-hover-bg-color: #4338ca; }
        body { font-family: sans-serif; }
        #modalNuevaCita.hidden { display: none; }
        #modalNuevaCita.flex { display: flex; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="p-4 pb-24">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">📅 Mi Agenda</h1>
            <button onclick="abrirModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">+ Nueva</button>
        </header>
        <div id="calendar" class="shadow-lg border rounded-2xl bg-white"></div>
    </div>

    <!-- FORMULARIO -->
    <div id="modalNuevaCita" class="hidden fixed inset-0 bg-black/60 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl p-6">
            <h2 class="text-lg font-bold mb-4">Programar Visita</h2>
            <div class="space-y-3">
                <input type="text" id="citaTitulo" placeholder="Asunto" class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="date" id="citaFecha" class="w-full px-4 py-2 border rounded-xl outline-none">
                <input type="time" id="citaHora" class="w-full px-4 py-2 border rounded-xl outline-none">
                <select id="citaDuracion" class="w-full px-4 py-2 border rounded-xl bg-white">
                    <option value="30">30 minutos</option>
                    <option value="60" selected>1 hora</option>
                    <option value="120">2 horas</option>
                </select>
                <input type="email" id="citaEmail" placeholder="Email del cliente" class="w-full px-4 py-2 border rounded-xl outline-none">
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-2 text-gray-500">Cancelar</button>
                <button onclick="guardarCita()" class="flex-1 bg-indigo-600 text-white py-2 rounded-xl font-bold">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://szxkpojcodemgomwwowt.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6eGtwb2pjb2RlbWdvZ213b3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Njc5MzksImV4cCI6MjA5MzE0MzkzOX0.9THtJxDemqWGlv4iVvDVJLTZptjpHaaC1vXr4-i-w80';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let calendar;

        document.addEventListener('DOMContentLoaded', function() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'es',
                selectable: true,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                select: function(info) { abrirModal(info.startStr.split('T')[0], info.startStr.split('T')[1]?.substring(0,5) || "09:00"); },
                events: async function(info, successCallback, failureCallback) {
                    const { data, error } = await _supabase.from('visitas').select('*');
                    if (error) return failureCallback(error);
                    successCallback(data.map(v => ({ id: v.id, title: v.titulo, start: v.fecha_inicio, end: v.fecha_fin })));
                },
                eventClick: async function(info) {
                    if(confirm(`¿Borrar "${info.event.title}"?`)) {
                        await _supabase.from('visitas').delete().eq('id', info.event.id);
                        calendar.refetchEvents();
                    }
                }
            });
            calendar.render();
        });

        function abrirModal(fecha = '', hora = '') {
            document.getElementById('modalNuevaCita').classList.replace('hidden', 'flex');
            if(fecha) document.getElementById('citaFecha').value = fecha;
            if(hora) document.getElementById('citaHora').value = hora;
        }

        function cerrarModal() { document.getElementById('modalNuevaCita').classList.replace('flex', 'hidden'); }

        async function guardarCita() {
            const titulo = document.getElementById('citaTitulo').value;
            const fecha = document.getElementById('citaFecha').value;
            const hora = document.getElementById('citaHora').value;
            const duracion = parseInt(document.getElementById('citaDuracion').value);
            const email = document.getElementById('citaEmail').value;
            
            if (!titulo || !fecha || !hora || !email) return alert("Por favor, rellena todos los campos");

            const inicio = new Date(`${fecha}T${hora}`);
            const fin = new Date(inicio.getTime() + duracion * 60000);

            // IMPORTANTE: Los nombres de abajo deben coincidir con tu tabla de la foto
            const { error } = await _supabase.from('visitas').insert([{ 
                titulo: titulo, 
                fecha_inicio: inicio.toISOString(), 
                fecha_fin: fin.toISOString(),
                email_cliente: email 
            }]);
            
            if (error) {
                console.error(error);
                alert("Error al guardar: " + error.message);
            } else {
                cerrarModal();
                calendar.refetchEvents();
                // Limpiar campos
                document.getElementById('citaTitulo').value = "";
                document.getElementById('citaEmail').value = "";
            }
        }
    </script>
</body>
</html>
